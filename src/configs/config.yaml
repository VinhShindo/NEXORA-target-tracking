camera:
  id: 0
  width: 640
  height: 480
  fps: 30
  use_mjpeg: true

display:
  width: 1152
  height: 864
  scale_up: true
  quality: 85
  preserve_aspect_ratio: true

detection:
  default_mode: "both"
  
  models:
    person:
      path: weights/yolov8n_person_lr001.pt
      classes: [0]
      names: ['person']
      color: '#00ff88'
      icon: '👤'
      
    ball:
      path: weights/yolov8n_ball.pt
      classes: [32]
      names: ['ball']
      color: '#ff8800'
      icon: '⚽'
      
    both:
      path: weights/yolov8n_person.pt
      classes: [0, 32]
      names: ['person', 'ball']
      color: '#00d4ff'
      icon: '🎯'
      
  confidence_threshold: 0.5
  iou_threshold: 0.45
  device: cpu
  process_every_n_frames: 1
  inference_size: 320

tracking:
  track_thresh: 0.4
  high_thresh: 0.6
  match_thresh: 0.7
  frame_rate: 30

robot:
  frame_width: 640
  frame_height: 480
  pid:
    kp: 0.05
    ki: 0.001
    kd: 0.01
  distance_pid:
    kp: 50.0
    ki: 0.002
    kd: 0.02
  target_distance: 1.0
  target_height: 150

performance:
  websocket:
    frame_quality: 80
    metrics_fps: 1
  jpeg_quality: 85
  resize_interpolation: linear

esp32:
  send_interval: 0.1
  timeout: 1.0