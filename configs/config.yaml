# NEXORA System Configuration

# Camera settings
camera:
  device_id: 0
  width: 640
  height: 480
  fps: 30

# Detection settings
detection:
  model_path: "weights/model.onnx"
  config_path: "configs/detection_config.yaml"
  confidence_threshold: 0.5
  nms_threshold: 0.4
  input_size: [224, 224]

# Tracking settings
tracking:
  max_lost: 10
  iou_threshold: 0.3
  max_tracks: 20

# Control settings
control:
  lateral:
    kp: 0.3
    ki: 0.01
    kd: 0.05
    max_output: 1.0
    min_output: -1.0
  
  distance:
    kp: 0.2
    ki: 0.005
    kd: 0.02
    max_output: 1.0
    min_output: -1.0
  
  desired_distance: 0.5
  desired_center: 0.5

# Navigation settings
navigation:
  target_class: "person"
  track_persistence: 0.5
  max_history: 50

# Robot settings
robot:
  max_speed: 0.5
  min_speed: 0.1
  max_angular: 0.5
  min_angular: 0.1

# Communication settings (ESP32)
communication:
  port: "/dev/ttyUSB0"
  baudrate: 115200
  timeout: 0.1

# UI settings
ui:
  window_name: "NEXORA"
  show_fps: true
  show_debug: false